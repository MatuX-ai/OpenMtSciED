<!-- 
  OpenMTSciEd 统一导航组件
  使用方法：在每个 HTML 页面的 <body> 开始处引入此文件
  需要同时引入 css/navbar.css 和 js/navbar.js
-->

<nav class="navbar" id="navbar">
    <div class="navbar-container">
        <!-- Logo -->
        <a href="index.html" class="navbar-logo">
            <img src="logo.png" alt="OpenMTSciEd Logo" class="navbar-logo-icon">
            <span>OpenMTSciEd</span>
        </a>

        <!-- 移动端菜单按钮 -->
        <button class="navbar-toggle" id="navbarToggle" aria-label="切换菜单">
            <span class="navbar-toggle-icon"></span>
            <span class="navbar-toggle-icon"></span>
            <span class="navbar-toggle-icon"></span>
        </button>

        <!-- 导航链接 -->
        <ul class="navbar-links" id="navbarLinks">
            <li><a href="index.html#features">核心特性</a></li>
            <li><a href="index.html#path">学习路径</a></li>
            <li><a href="index.html#hardware">硬件项目</a></li>
            <li><a href="index.html#community">社区</a></li>
            <li><a href="https://github.com/MatuX-ai/OpenMtSciED" target="_blank">GitHub</a></li>
            
            <!-- 用户登录控件 -->
            <li class="navbar-auth" id="navbarAuth">
                <!-- 未登录状态 -->
                <button class="btn-login" id="btnLogin" onclick="handleLogin()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    <span>登录</span>
                </button>
                
                <!-- 已登录状态（默认隐藏） -->
                <div class="user-menu" id="userMenu" style="display: none;">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span class="user-name" id="userName">用户</span>
                    </div>
                    <div class="user-dropdown">
                        <a href="#" class="dropdown-item" onclick="showProfile()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            个人中心
                        </a>
                        <a href="#" class="dropdown-item" onclick="showDashboard()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"/>
                                <rect x="14" y="3" width="7" height="7"/>
                                <rect x="14" y="14" width="7" height="7"/>
                                <rect x="3" y="14" width="7" height="7"/>
                            </svg>
                            学习仪表盘
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item logout" onclick="handleLogout()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            退出登录
                        </a>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</nav>
