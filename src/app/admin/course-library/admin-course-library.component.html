<div class="admin-course-library">
  
  <!-- 头部 -->
  <div class="library-header">
    <h2>
      <mat-icon>school</mat-icon>
      课程库管理
    </h2>
    <div class="header-actions">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>搜索课程</mat-label>
        <input matInput [(ngModel)]="searchQuery()" (keyup.enter)="onSearch(searchQuery())">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <button mat-button (click)="onRefresh()">
        <mat-icon>refresh</mat-icon>
        刷新
      </button>
      <button mat-raised-button color="accent" (click)="exportCourses()">
        <mat-icon>download</mat-icon>
        导出数据
      </button>
    </div>
  </div>

  <!-- 加载状态 -->
  <div class="loading-spinner" *ngIf="loading()">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    <p>加载中...</p>
  </div>

  <!-- 主要内容 -->
  <div *ngIf="!loading()">
    
    <!-- 统计卡片 -->
    <div class="stats-grid" *ngIf="courseStats()">
      <mat-card class="stat-card">
        <div class="stat-icon" style="color: #2196f3;">
          <mat-icon>class</mat-icon>
        </div>
        <div class="stat-info">
          <div class="stat-value">{{ courseStats()!.total_courses }}</div>
          <div class="stat-label">课程总数</div>
        </div>
      </mat-card>
      
      <mat-card class="stat-card">
        <div class="stat-icon" style="color: #4caf50;">
          <mat-icon>people</mat-icon>
        </div>
        <div class="stat-info">
          <div class="stat-value">{{ courseStats()!.total_enrollments }}</div>
          <div class="stat-label">总报名数</div>
        </div>
      </mat-card>
      
      <mat-card class="stat-card">
        <div class="stat-icon" style="color: #ff9800;">
          <mat-icon>star</mat-icon>
        </div>
        <div class="stat-info">
          <div class="stat-value">{{ courseStats()!.average_rating.toFixed(1) }}</div>
          <div class="stat-label">平均评分</div>
        </div>
      </mat-card>
      
      <mat-card class="stat-card">
        <div class="stat-icon" style="color: #9c27b0;">
          <mat-icon>trending_up</mat-icon>
        </div>
        <div class="stat-info">
          <div class="stat-value">{{ courseStats()!.completion_rate }}%</div>
          <div class="stat-label">完成率</div>
        </div>
      </mat-card>
    </div>

    <!-- 标签页 -->
    <mat-tab-group class="tabs-container" [(selectedIndex)]="selectedTab()">
      
      <!-- 全部课程 -->
      <mat-tab label="全部课程">
        <div class="tab-content">
          <div class="course-grid" *ngIf="allCourses$ | async as courses; else loadingCourses">
            <app-unified-course-card
              *ngFor="let course of courses"
              [config]="{
                course: course,
                showEnrollButton: false,
                showProgress: false
              }"
              (detail)="onCourseDetail(course.id)">
            </app-unified-course-card>
          </div>
          <ng-template #loadingCourses>
            <div class="loading-spinner">
              <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
              <p>加载课程中...</p>
            </div>
          </ng-template>
        </div>
      </mat-tab>

      <!-- 热门课程 -->
      <mat-tab label="热门课程">
        <div class="tab-content">
          <div class="course-grid" *ngIf="popularCourses$ | async as courses; else loadingCourses">
            <app-unified-course-card
              *ngFor="let course of courses"
              [config]="{
                course: course,
                showEnrollButton: false,
                showProgress: false
              }"
              (detail)="onCourseDetail(course.id)">
            </app-unified-course-card>
          </div>
        </div>
      </mat-tab>

      <!-- 最新课程 -->
      <mat-tab label="最新课程">
        <div class="tab-content">
          <div class="course-grid" *ngIf="newestCourses$ | async as courses; else loadingCourses">
            <app-unified-course-card
              *ngFor="let course of courses"
              [config]="{
                course: course,
                showEnrollButton: false,
                showProgress: false
              }"
              (detail)="onCourseDetail(course.id)">
            </app-unified-course-card>
          </div>
        </div>
      </mat-tab>

    </mat-tab-group>
    
  </div>
  
</div>
