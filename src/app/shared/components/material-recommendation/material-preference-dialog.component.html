<h2 mat-dialog-title>推荐偏好设置</h2>
<mat-dialog-content class="dialog-content">
  <form [formGroup]="form" class="preference-form">
    
    <!-- 学科偏好 -->
    <div class="form-section">
      <h3>学科偏好</h3>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>选择感兴趣的学科</mat-label>
        <mat-select formControlName="preferredSubjects" multiple>
          <mat-option *ngFor="let subject of subjects" [value]="subject">
            {{ subject }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    
    <!-- 年级偏好 -->
    <div class="form-section">
      <h3>年级偏好</h3>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>选择适用年级</mat-label>
        <mat-select formControlName="preferredGrades" multiple>
          <mat-option *ngFor="let grade of grades" [value]="grade">
            {{ grade }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    
    <!-- 难度偏好 -->
    <div class="form-section">
      <h3>难度偏好</h3>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>选择偏好难度</mat-label>
        <mat-select formControlName="difficultyPreference">
          <mat-option value="easy">简单</mat-option>
          <mat-option value="medium">中等</mat-option>
          <mat-option value="hard">困难</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    
    <!-- 内容类型偏好 -->
    <div class="form-section">
      <h3>内容类型偏好</h3>
      <mat-chip-listbox formControlName="contentTypePreference" multiple>
        <mat-chip-option *ngFor="let type of contentTypes" [value]="type">
          {{ type }}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>
    
    <!-- 标签偏好 -->
    <div class="form-section">
      <h3>标签偏好</h3>
      <div class="tags-section">
        <h4>感兴趣的标签</h4>
        <mat-chip-listbox formControlName="tagsOfInterest" multiple class="tags-list">
          <mat-chip-option *ngFor="let tag of allTags" [value]="tag">
            {{ tag }}
          </mat-chip-option>
        </mat-chip-listbox>
      </div>
      
      <div class="tags-section">
        <h4>不感兴趣的标签</h4>
        <mat-chip-listbox formControlName="excludedTags" multiple class="tags-list">
          <mat-chip-option *ngFor="let tag of allTags" [value]="tag">
            {{ tag }}
          </mat-chip-option>
        </mat-chip-listbox>
      </div>
    </div>
    
    <!-- 时长偏好 -->
    <div class="form-section">
      <h3>时长偏好</h3>
      <mat-chip-listbox formControlName="preferredDurations" multiple>
        <mat-chip-option *ngFor="let duration of durations" [value]="duration.value">
          {{ duration.label }}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>
    
    <!-- 学习目标 -->
    <div class="form-section">
      <h3>学习目标</h3>
      <mat-chip-listbox formControlName="learningGoals" multiple>
        <mat-chip-option *ngFor="let goal of learningGoals" [value]="goal">
          {{ goal }}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>
    
    <!-- 最低评分阈值 -->
    <div class="form-section">
      <h3>质量要求</h3>
      <div class="slider-container">
        <mat-label>最低评分: {{ form.value.minRatingThreshold }} 星</mat-label>
        <mat-slider formControlName="minRatingThreshold" min="1" max="5" step="0.5" thumbLabel>
        </mat-slider>
      </div>
    </div>
    
    <!-- 个性化推荐开关 -->
    <div class="form-section">
      <mat-checkbox formControlName="enablePersonalizedRecommendations" color="primary">
        启用个性化推荐（系统会根据您的使用行为优化推荐结果）
      </mat-checkbox>
    </div>
    
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">取消</button>
  <button mat-raised-button color="primary" type="button" (click)="onSave()" [disabled]="form.invalid">
    保存设置
  </button>
</mat-dialog-actions>
