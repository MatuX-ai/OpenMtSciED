# OpenHydra 配置文件
# 用于本地测试环境

[server]
host = 0.0.0.0
port = 8080
debug = true
log_level = INFO

[database]
url = postgresql://openhydra:openhydra123@postgres-openhydra:5432/openhydra
pool_size = 10
max_overflow = 20

[redis]
url = redis://redis-openhydra:6379/0
password = 

[jupyterhub]
url = http://jupyterhub:8000
api_url = http://jupyterhub:8000/hub/api
oauth_client_id = openhydra-client
oauth_client_secret = openhydra-secret123

[kubernetes]
enabled = false
kubeconfig = /etc/kubernetes/config
namespace = openhydra
gpu_support = false

[authentication]
type = local
admin_username = admin
admin_password = admin123
session_timeout = 3600

[resources]
default_cpu_limit = 2.0
default_memory_limit = 4Gi
default_gpu_limit = 0
max_cpu_limit = 8.0
max_memory_limit = 16Gi
max_gpu_limit = 1

[xedu_integration]
enabled = true
default_notebook_image = xedu/notebook:latest
preloaded_toolchain = true
auto_install_packages = true
