# SonarQube后端Python项目配置
# =============================================================================

# 项目基本信息
sonar.projectKey=imatuproject-backend
sonar.projectName=iMatu后端服务
sonar.projectVersion=1.0.0

# 源码路径
sonar.sources=.
sonar.tests=tests

# Python特定配置
sonar.python.version=3.9
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml
sonar.python.bandit.reportPaths=bandit-report.json
sonar.python.pylint.reportPaths=pylint-report.txt

# 排除配置
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/venv/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/*.pyo,\
  **/migrations/**,\
  **/alembic/versions/**,\
  **/tests/**,\
  **/scripts/**,\
  **/temp/**,\
  **/logs/**,\
  **/*.log,\
  **/redis.zip,\
  **/converted_models/**

# 包含文件
sonar.inclusions=**/*.py

# 复杂度配置
sonar.python.pylint_config=.pylintrc
sonar.python.flake8_config=.flake8

# 安全扫描配置
sonar.python.bandit.config=.bandit
sonar.python.safety.db.path=safety-db.json

# 代码重复检测
sonar.cpd.exclusions=**/migrations/**,**/alembic/versions/**

# 自定义规则
sonar.python.pylint.arguments=--rcfile=.pylintrc
sonar.python.flake8.arguments=--config=.flake8

# 测试配置
sonar.python.coveragePlugin=cobertura
sonar.python.coverage.reportPaths=coverage.xml

# 分析参数
sonar.sourceEncoding=UTF-8
sonar.verbose=false
