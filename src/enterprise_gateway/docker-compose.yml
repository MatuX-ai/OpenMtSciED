version: '3.8'

services:
  # 企业API网关服务
  enterprise-gateway:
    build:
      context: ../..
      dockerfile: backend/enterprise_gateway/Dockerfile
    container_name: enterprise-gateway
    ports:
      - "8001:8001"
    environment:
      - APP_NAME=iMato企业API网关
      - APP_VERSION=1.0.0
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8001
      - ENTERPRISE_DATABASE_URL=postgresql://enterprise_user:enterprise_pass@enterprise-db:5432/enterprise_gateway
      - ENTERPRISE_JWT_SECRET=${ENTERPRISE_JWT_SECRET}
      - ENTERPRISE_JWT_ALGORITHM=HS256
      - ENTERPRISE_TOKEN_EXPIRE_HOURS=24
      - DEVICE_WHITELIST_ENABLED=true
      - DEFAULT_API_QUOTA_LIMIT=10000
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/enterprise_gateway.log
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - enterprise-db
      - redis-cache
    networks:
      - enterprise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 企业网关数据库
  enterprise-db:
    image: postgres:13-alpine
    container_name: enterprise-db
    environment:
      - POSTGRES_DB=enterprise_gateway
      - POSTGRES_USER=enterprise_user
      - POSTGRES_PASSWORD=enterprise_pass
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - enterprise-db-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # 避免与主应用端口冲突
    networks:
      - enterprise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_user -d enterprise_gateway"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存服务
  redis-cache:
    image: redis:6-alpine
    container_name: enterprise-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis-data:/data
    ports:
      - "6380:6379"  # 避免与主应用端口冲突
    networks:
      - enterprise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理
  enterprise-nginx:
    image: nginx:alpine
    container_name: enterprise-nginx
    ports:
      - "8443:443"  # HTTPS端口
      - "8081:80"   # HTTP端口
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - enterprise-gateway
    networks:
      - enterprise-network
    restart: unless-stopped

  # 监控服务 (Prometheus)
  prometheus:
    image: prom/prometheus:v2.37.0
    container_name: enterprise-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - enterprise-network
    restart: unless-stopped

  # 监控服务 (Grafana)
  grafana:
    image: grafana/grafana:9.1.0
    container_name: enterprise-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - enterprise-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  enterprise-network:
    driver: bridge

volumes:
  enterprise-db-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
