# Grafana数据源配置
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "30s"
    editable: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: enterprise-db:5432
    database: enterprise_gateway
    user: enterprise_user
    secureJsonData:
      password: "enterprise_pass"
    jsonData:
      sslmode: "disable"
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1300
    editable: true
