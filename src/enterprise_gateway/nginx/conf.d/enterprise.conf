upstream enterprise_api {
    server enterprise-gateway:8001;
}

# HTTP服务器配置
server {
    listen 80;
    server_name enterprise.api.imato.com localhost;

    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器配置
server {
    listen 443 ssl http2;
    server_name enterprise.api.imato.com localhost;

    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/enterprise.crt;
    ssl_certificate_key /etc/nginx/ssl/enterprise.key;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头配置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志配置
    access_log /var/log/nginx/enterprise.access.log;
    error_log /var/log/nginx/enterprise.error.log;

    # 主要API路由
    location /api/enterprise/ {
        proxy_pass http://enterprise_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Device-ID $http_x_device_id;

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://enterprise_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # 文档端点
    location /docs {
        proxy_pass http://enterprise_api/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://enterprise_api/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://enterprise_api/openapi.json;
        proxy_set_header Host $host;
    }

    # 速率限制配置
    limit_req_zone $binary_remote_addr zone=enterprise_api:10m rate=100r/s;
    limit_req zone=enterprise_api burst=200 nodelay;

    # 客户端最大请求体大小
    client_max_body_size 10M;

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
