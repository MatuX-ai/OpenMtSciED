<!-- OpenMTSciEd Favicon - SVG Format -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#stemGradient)" />
  
  <!-- STEM Letters -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="-2">STEM</text>
  
  <!-- Knowledge Graph Nodes (decorative) -->
  <circle cx="12" cy="12" r="3" fill="white" opacity="0.6" />
  <circle cx="52" cy="12" r="3" fill="white" opacity="0.6" />
  <circle cx="12" cy="52" r="3" fill="white" opacity="0.6" />
  <circle cx="52" cy="52" r="3" fill="white" opacity="0.6" />
  
  <!-- Connection Lines -->
  <line x1="15" y1="15" x2="49" y2="15" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="15" y1="49" x2="49" y2="49" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="15" y1="15" x2="15" y2="49" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="49" y1="15" x2="49" y2="49" stroke="white" stroke-width="1" opacity="0.4" />
</svg>
