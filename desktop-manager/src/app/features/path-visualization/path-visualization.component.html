<div class="path-container">
  <div class="header">
    <h2>学习路径可视化</h2>
    <div class="controls">
      <select (change)="onAgeChange($event)" class="age-select">
        <option *ngFor="let preset of agePresets" [value]="preset.age" [selected]="testUser.age === preset.age">
          {{ preset.label }}
        </option>
      </select>
      <button (click)="generatePath()" [disabled]="loading">
        {{ loading ? '生成中...' : '生成路径' }}
      </button>
    </div>
  </div>
  
  <div class="stats" *ngIf="pathData">
    <div class="stat-card">
      <span class="label">总节点数</span>
      <span class="value">{{ pathData.summary.total_nodes }}</span>
    </div>
    <div class="stat-card">
      <span class="label">总学时</span>
      <span class="value">{{ pathData.summary.total_hours }}h</span>
    </div>
    <div class="stat-card">
      <span class="label">平均难度</span>
      <span class="value">{{ pathData.summary.avg_difficulty }}</span>
    </div>
  </div>
  
  <div #chartContainer class="chart-container"></div>
  
  <!-- 动态调整建议 -->
  <div class="adjustment-panel" *ngIf="adjustmentSuggestions">
    <h3>💡 学习路径优化建议</h3>
    <p>根据您的练习记录，以下知识点需要加强：</p>
    <div class="weak-points">
      <span *ngFor="let point of adjustmentSuggestions.weak_points" class="point-tag">{{ point }}</span>
    </div>
    <button (click)="navigateToPractice(adjustmentSuggestions.weak_points[0])" class="btn-practice">
      前往针对性练习
    </button>
  </div>

  <div class="legend">
    <div class="legend-item">
      <span class="dot course_unit"></span>
      <span>课程单元</span>
    </div>
    <div class="legend-item">
      <span class="dot knowledge_point"></span>
      <span>知识点</span>
    </div>
    <div class="legend-item">
      <span class="dot cross_discipline_kp"></span>
      <span>跨学科</span>
    </div>
    <div class="legend-item">
      <span class="dot textbook_chapter"></span>
      <span>教材章节</span>
    </div>
    <div class="legend-item">
      <span class="dot hardware_project"></span>
      <span>硬件项目</span>
    </div>
  </div>
</div>
