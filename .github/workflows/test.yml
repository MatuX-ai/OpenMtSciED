name: OpenMTSciEd CI

on: [push, pull_request]

jobs:
  test-backend-next:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install backend-next dependencies
      run: |
        cd backend-next
        npm ci --prefer-offline=false

    - name: Clear Next.js cache
      run: |
        cd backend-next
        rm -rf .next
        rm -rf node_modules/.cache

    - name: Build backend-next
      run: |
        cd backend-next
        npx prisma generate
        npm run build

    - name: Run backend-next lint
      run: |
        cd backend-next
        npm run lint

  test-admin-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install admin-web dependencies
      run: |
        cd admin-web
        npm ci

    - name: Build admin-web
      run: |
        cd admin-web
        npm run build
