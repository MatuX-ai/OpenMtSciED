name: OpenMTSciEd CI

on: [push, pull_request]

jobs:
  test-backend-next:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install backend-next dependencies
      run: |
        cd backend-next
        npm ci

    - name: Build backend-next
      run: |
        cd backend-next
        npm run build

    - name: Run backend-next lint
      run: |
        cd backend-next
        npm run lint

  test-admin-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install admin-web dependencies
      run: |
        cd admin-web
        npm ci

    - name: Build admin-web
      run: |
        cd admin-web
        npm run build

  test-legacy-python:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run backend tests
      run: |
        export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
        pytest tests/ -v
