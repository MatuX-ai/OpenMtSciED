name: "✨ Feature Request"
description: "为这个项目提出一个新功能建议"
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出新功能建议！

  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 您的功能请求是否与某个问题相关？请描述
      placeholder: 我总是感到困扰当...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 您希望发生什么？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过哪些替代解决方案？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - 低
        - 中
        - 高
        - 紧急

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 添加任何其他上下文或截图
