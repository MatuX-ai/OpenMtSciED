name: "🐛 Bug Report"
description: "报告一个 bug 帮助我们改进"
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写这个 bug 报告！

  - type: textarea
    id: what-happened
    attributes:
      label: 发生了什么？
      description: 请详细描述您遇到的问题
      placeholder: 告诉我发生了什么...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何重现这个行为？
      placeholder: |
        1. 进入 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望发生什么？
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 运行环境
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - Docker

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 您使用的是哪个版本？
      placeholder: v0.1.0

  - type: textarea
    id: logs
    attributes:
      label: 相关日志输出
      description: 请复制并粘贴任何相关的日志输出
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 添加任何其他有关问题的上下文
